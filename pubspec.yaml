name: lexref
description: Legal reference app for Indian advocates

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  dio: ^5.4.3
  sqflite: ^2.4.2
  path: ^1.9.0
  supabase_flutter: ^2.5.6
  flutter_markdown: ^0.7.3
  share_plus: ^9.0.0
  flutter_tts: ^4.0.2
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  connectivity_plus: ^6.1.5
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  package_info_plus: ^8.1.0
  google_fonts: ^6.2.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1
  purchases_flutter: ^8.0.0
  shared_preferences: ^2.3.0
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B4FD8"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/ipc.json
    - assets/data/crpc.json
    - assets/data/cpc.json
    - assets/data/evidence_act.json
    - assets/data/bns.json
    - assets/data/bnss.json
    - assets/data/ni_act.json
    - assets/data/tp_act.json
    - assets/data/it_act.json
    - assets/data/mv_act.json
    - assets/data/mh_rent_act.json
    - assets/data/mh_coop_act.json
    - assets/data/dl_rent_act.json
    - assets/data/ka_rent_act.json
    - assets/data/ka_land_revenue_act.json
    - assets/data/tn_rent_act.json
    - assets/data/up_buildings_act.json
