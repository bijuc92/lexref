name: lexref
description: Legal reference app for Indian advocates

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  dio: ^5.4.3
  sqflite: ^2.4.2
  path: ^1.9.0
  supabase_flutter: ^2.5.6
  flutter_markdown: ^0.7.3
  share_plus: ^9.0.0
  flutter_tts: ^4.0.2
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  connectivity_plus: ^6.1.5
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0
  freezed: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - assets/data/ipc.json
    - assets/data/crpc.json
    - assets/data/cpc.json
    - assets/data/evidence_act.json
    - assets/data/bns.json
    - assets/data/bnss.json
